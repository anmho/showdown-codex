<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 12px/1.5 -apple-system, sans-serif; width: 380px; margin: 0; padding: 12px; background: #1b1d22; color: #e8e8ea; }
      h1 { font-size: 13px; margin: 0 0 8px; }
      .row { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
      .ok { background: #3fb950; } .bad { background: #f85149; }
      .muted { color: #9a9aa2; }
      #log { max-height: 360px; overflow-y: auto; margin-top: 4px; }
      @keyframes pop-in {
        0% {
          opacity: 0;
          transform: scale(0.97) translateY(-10px);
          max-height: 0;
          margin-top: 0;
          margin-bottom: 0;
          padding-top: 0;
          padding-bottom: 0;
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
          max-height: 800px;
          margin-top: 6px;
          margin-bottom: 6px;
          padding-top: 6px;
          padding-bottom: 6px;
        }
      }
      .entry { background: #22252c; border-radius: 6px; padding: 6px 8px; margin: 6px 0; transition: all 0.3s ease; }
      .entry.new-entry {
        animation: pop-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        overflow: hidden;
      }
      .entry .action { font-weight: 600; }
      .entry .why { font-size: 11px; font-style: italic; color: #b8b8c0; margin-top: 2px; }
      details { margin-top: 4px; }
      summary { cursor: pointer; color: #6ea8fe; font-size: 11px; }
      pre { background: #15171b; border-radius: 4px; padding: 6px; margin: 4px 0 0; font: 10.5px/1.45 ui-monospace, Menlo, monospace; white-space: pre-wrap; word-break: break-word; max-height: 180px; overflow-y: auto; color: #cdd3dc; }
      .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #7d8590; margin-top: 6px; }
      label { cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Showdown Codex Autopilot</h1>
    <div class="row"><span><span id="dot" class="dot bad"></span><span id="conn">…</span></span><span class="muted" id="model"></span></div>
    <div class="row"><label><input type="checkbox" id="enabled" /> Autopilot enabled</label></div>
    <div class="row"><label><input type="checkbox" id="chat" /> Allow chat</label></div>
    <div class="row"><span class="muted">Decisions</span><span id="decisions">0</span></div>
    <div class="row"><span class="muted">Win Rate (W / L)</span><span><span id="winrate">0% (0 / 0)</span><a href="#" id="reset-stats" style="color: #f85149; font-size: 10px; text-decoration: none; margin-left: 10px;">Reset</a></span></div>
    <div class="row"><span class="muted">Tokens in / cached / out</span><span id="tokens">0 / 0 / 0</span></div>
    <div class="muted" id="status"></div>
    <div class="muted" style="margin-top:6px">Decisions (raw model output)</div>
    <div id="log"></div>
    <script src="popup.js"></script>
  </body>
</html>
